# Starter source packs for authoritative web search (extend via config, not Python).
#
# Tier rules:
# - trusted_domains: primary/official/authoritative sources.
# - reputed_domains: credible news, institutional explainers, reputable reference.
# - exam_prep_domains: supporting-only exam-prep/coaching platforms — never confirm
#   official dates/results/eligibility/notifications alone.
# - blocked_domains: pack-specific domains never selected unless future override exists.
# - global_blocked: social/UGC/video/low-trust domains blocked across all packs.
#
# These are starter packs — expand gradually from safe retrieval logs, not bulk lists.

global_blocked:
  domains:
    - youtube.com
    - facebook.com
    - instagram.com
    - x.com
    - quora.com
    - medium.com
    - reddit.com

